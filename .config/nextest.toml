[profile.default]
slow-timeout = { period = "1s", terminate-after = 5, grace-period = "2s" }
fail-fast = false

# The smoke test spawns the herostratus binary once per branch and walks all of
# history each time, so it scales with the repo and easily exceeds the global
# 5s threshold under llvm-cov instrumentation in CI.
[[profile.default.overrides]]
filter = "test(=smoke_test_on_all_own_branches)"
slow-timeout = { period = "15s", terminate-after = 6, grace-period = "5s" }
