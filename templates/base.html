<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ site_title }}{% endblock %}</title>
    <style>
        table.sortable th {
            cursor: pointer;
            user-select: none;
        }
        table.sortable th:after {
            content: " ▷";
            opacity: 0.3;
        }
        table.sortable th.sort-asc:after {
            content: " △";
            opacity: 1;
        }
        table.sortable th.sort-desc:after {
            content: " ▽";
            opacity: 1;
        }
        .table-filter {
            margin-bottom: 0.5em;
        }
        .table-filter input {
            padding: 0.25em 0.5em;
        }
    </style>
</head>
<body>
    <nav>
        <a href="{{ root }}">Home</a> |
        <a href="{{ root }}achievements.html">Achievements</a> |
        <a href="{{ root }}users.html">Users</a>
    </nav>
    <hr>
    {% block content %}{% endblock %}
    <hr>
    <footer>
        Generated by <a href="https://github.com/Notgnoshi/herostratus">Herostratus</a>
    </footer>
    <script>
    function getHeaderAndDataRows(table) {
        var allRows = Array.from(table.rows);
        var headers = allRows.filter(function(r) { return r.querySelector("th"); });
        var dataRows = allRows.filter(function(r) { return !r.querySelector("th"); });
        if (headers.length === 0 || dataRows.length === 0) return null;
        return { headerCells: headers[0].cells, dataRows: dataRows };
    }

    function filterRows(dataRows, text) {
        var lower = text.toLowerCase();
        for (var i = 0; i < dataRows.length; i++) {
            dataRows[i].style.display =
                dataRows[i].textContent.toLowerCase().indexOf(lower) >= 0 ? "" : "none";
        }
    }

    function addFilterInput(table, dataRows) {
        var filter = document.createElement("div");
        filter.className = "table-filter";
        var input = document.createElement("input");
        input.type = "text";
        input.placeholder = "Filter...";
        input.setAttribute("data-table-id", table.id);
        input.addEventListener("input", function() {
            filterRows(dataRows, this.value);
        });
        filter.appendChild(input);
        table.parentNode.insertBefore(filter, table);
    }

    function compareValues(av, bv, asc) {
        var an = parseFloat(av), bn = parseFloat(bv);
        if (!isNaN(an) && !isNaN(bn)) {
            return asc ? an - bn : bn - an;
        }
        return asc ? av.localeCompare(bv) : bv.localeCompare(av);
    }

    function sortByColumn(headerCells, dataRows, col) {
        var th = headerCells[col];
        var asc = !th.classList.contains("sort-asc");
        for (var j = 0; j < headerCells.length; j++) {
            headerCells[j].classList.remove("sort-asc", "sort-desc");
        }
        th.classList.add(asc ? "sort-asc" : "sort-desc");

        dataRows.sort(function(a, b) {
            return compareValues(
                a.cells[col].textContent.trim(),
                b.cells[col].textContent.trim(),
                asc
            );
        });
        var parent = dataRows[0].parentNode;
        for (var i = 0; i < dataRows.length; i++) {
            parent.appendChild(dataRows[i]);
        }
    }

    function addSortHandler(headerCells, dataRows, col) {
        headerCells[col].addEventListener("click", function() {
            sortByColumn(headerCells, dataRows, col);
        });
    }

    function initTables() {
        var filterables = document.querySelectorAll("table.filterable");
        for (var i = 0; i < filterables.length; i++) {
            var parsed = getHeaderAndDataRows(filterables[i]);
            if (parsed) addFilterInput(filterables[i], parsed.dataRows);
        }

        var sortables = document.querySelectorAll("table.sortable");
        for (var i = 0; i < sortables.length; i++) {
            var parsed = getHeaderAndDataRows(sortables[i]);
            if (!parsed) continue;
            for (var col = 0; col < parsed.headerCells.length; col++) {
                addSortHandler(parsed.headerCells, parsed.dataRows, col);
            }
        }
    }

    initTables();
    </script>
</body>
</html>
